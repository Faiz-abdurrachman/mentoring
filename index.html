<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HerAI Mentoring: Python Quest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>
</head>
<body>

    <!-- Animated Playful Background -->
    <div class="bg-mesh">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Gamified Topbar -->
    <header class="quest-header">
        <img src="referensi/logo-her-ai-transparent.png" class="quest-logo" alt="HerAI" onerror="this.src='https://via.placeholder.com/120x40?text=HerAI'">
        <div class="xp-bar-container">
            <div class="xp-label">Level <span id="currentLevel">0</span>/<span id="totalLevel">29</span></div>
            <div class="xp-bar"><div class="xp-fill" id="xpFill"></div></div>
        </div>
    </header>

    <!-- Floating Playful Mascot -->
    <div class="guide-mascot">
        <img src="referensi/persona-her-ai.png" alt="HerAI Guide" class="guide-img" onerror="this.src='https://via.placeholder.com/150x180?text=Guide'">
        <div class="guide-bubble" id="mascotBubble">
            Selamat datang di Python Quest! Scroll ke bawah untuk memulai petualangan.
        </div>
    </div>

    <!-- The Quest Map (Main Content) -->
    <main class="quest-map" id="questMap">
        <div class="quest-line"></div>
        
        <!-- Welcome Node -->
        <div class="checkpoint welcome-node active" id="node-0">
            <div class="map-dot"><i class="fas fa-flag"></i></div>
            <div class="card-wrapper" style="width:100%; margin: 0; padding:0; justify-content:center;">
                <div class="playful-card">
                    <h1 style="font-size: 3rem;">Siap Memulai <br><span class="text-pink">Python Quest?</span></h1>
                    <p style="font-size: 1.3rem; margin-top:20px; color: var(--text-dark);">
                        Malam ini kita akan memastikan alat tempur kamu siap, dan merangkai baris kode Python pertamamu.
                    </p>
                    <button class="btn-start" onclick="document.getElementById('node-1').scrollIntoView({behavior:'smooth', block:'center'})">
                        Mulai Petualangan <i class="fas fa-play" style="margin-left: 10px;"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Dynamic Nodes Injected Here -->
        <div id="nodesContainer"></div>

    </main>

    <script src="js/content.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
