<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HerAI Mentoring: Python Kickstart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>
</head>
<body>

    <div class="layout">
        
        <!-- Gamified Sidebar -->
        <aside class="sidebar">
            <img class="sidebar-logo" src="referensi/logo-her-ai-transparent.png" alt="HerAI">
            <div class="sidebar-title">Sesi 2: Kickstart Python</div>
            
            <!-- Mascot seamlessly integrated -->
            <div class="mascot-profile">
                <img src="referensi/persona-her-ai.png" alt="Guide" class="mascot-img">
                <div class="mascot-speech" id="mascotText">
                    Halo! Tekan tombol Panah Bawah atau scroll untuk memulai perjalanan belajarmu.
                </div>
            </div>

            <!-- Gamified Path Nodes (Generated dynamically) -->
            <div class="journey-progress" id="journeyProgress">
                <!-- Nodes injected by JS -->
            </div>
        </aside>

        <!-- Main Scrolling Gamified Journey -->
        <main class="main-content" id="mainContent">
            <!-- Connecting Line -->
            <div class="journey-line"></div>
            
            <!-- Dynamic Cards injected here -->
            <div id="slidesContainer">
                <section class="slide active" id="slide-0">
                    <div class="glass-card text-center">
                        <h1 style="font-size: 3.5rem;">Siap Membangun <br><span class="text-pink">Inovasi AI?</span></h1>
                        <p style="font-size: 1.2rem; color: var(--text-muted); margin-top:20px;">
                            Malam ini kita akan memastikan alat tempur kamu siap,<br>dan merangkai baris kode Python pertamamu.
                        </p>
                        <div class="guide-arrow">
                            <i class="fas fa-arrow-down" style="font-size: 1.5rem; color: var(--primary-pink);"></i>
                            Mulai Perjalanan
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="js/content.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
