<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HerAI Mentoring: Python Quest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>
</head>
<body>

    <!-- Elegant Background -->
    <div class="bg-mesh"></div>

    <!-- Clean Topbar -->
    <header class="quest-header">
        <img src="referensi/logo-her-ai-transparent.png" class="quest-logo" alt="HerAI" onerror="this.src='https://via.placeholder.com/120x40?text=HerAI'">
        <div class="xp-bar-container">
            <div class="xp-label">Progress</div>
            <div class="xp-bar"><div class="xp-fill" id="xpFill"></div></div>
            <div class="xp-label"><span id="currentLevel">0</span>/<span id="totalLevel">29</span></div>
        </div>
    </header>

    <!-- Floating Elegant Mascot (Left Bottom) -->
    <div class="guide-mascot">
        <div class="guide-bubble" id="mascotBubble">
            Selamat datang di HerAI Mentoring. Scroll untuk memulai perjalanan belajarmu.
        </div>
        <img src="referensi/persona-her-ai.png" alt="HerAI Guide" class="guide-img" onerror="this.src='https://via.placeholder.com/150x180?text=Guide'">
    </div>

    <!-- Neat Vertical Timeline (Main Content) -->
    <main class="quest-map" id="questMap">
        <div class="quest-line"></div>
        
        <!-- Welcome Node (Hero Section) -->
        <div class="checkpoint welcome-node active" id="node-0">
            <div class="map-dot"><i class="fas fa-play"></i></div>
            <div class="card-wrapper">
                <div class="hero-card">
                    <div class="hero-badge">📅 SESI HARI INI</div>
                    <h1 class="hero-title">Python <span>Kickstart</span></h1>
                    <p class="hero-desc">
                        Selamat datang di kelas interaktif HerAI. Malam ini kita akan fokus menguasai fondasi dasar bahasa pemrograman Python dari nol.
                    </p>
                    <button class="btn-start" onclick="document.getElementById('node-1').scrollIntoView({behavior:'smooth', block:'center'})">
                        Mulai Kelas <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Dynamic Nodes Injected Here -->
        <div id="nodesContainer"></div>

    </main>

    <script src="js/content.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
